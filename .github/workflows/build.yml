name: Build Jenesis Launcher

on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # Release commits are handled exclusively by release.yml (which runs the same
    # Jenesis build+test as part of staging). Skip them here to avoid duplicate work.
    if: >-
      github.event_name != 'push' ||
      !(startsWith(github.event.head_commit.message, '[release]') ||
        startsWith(github.event.head_commit.message, '[release '))
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 26
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '26'

      - name: Build and test with Jenesis
        run: java build/jenesis/Project.java
